<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>귤냥이와 친구들 - THE 3MATCH PUZZLE</title>
<style>
:root{
  --design-w: 750;
  --design-h: 1334;
  --safe: 64px;
  --c-bl01: #ff9a3d; /* 귤모자 */
  --c-bl02: #2b2b33; /* 닌자 */
  --c-bl03: #e0435c; /* 호랑이 후드 */
  --c-bl04: #ffb3cc; /* 토끼 */
  --c-bl05: #ff7a1a; /* 공룡 */
  --panel: #1c2130;
  --panel2: #262c40;
  --accent: #ffb02e;
  --accent2: #4a7bff;
}
*{box-sizing:border-box; -webkit-tap-highlight-color: transparent; user-select:none;}
html,body{
  margin:0; padding:0; width:100%; height:100%;
  background:#0a0c14;
  font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', Pretendard, sans-serif;
  overflow:hidden; touch-action:none;
  color:#fff;
}
#viewport-outer{
  position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
  background: radial-gradient(circle at 50% 20%, #1a2036 0%, #05060b 75%);
}
#stage{
  position:relative;
  width:750px; height:1334px;
  transform-origin: center center;
  background: linear-gradient(180deg,#2a3358 0%, #171b2c 55%, #0c0e18 100%);
  overflow:hidden;
  box-shadow: 0 0 60px rgba(0,0,0,.6);
  border-radius: 10px;
}
.scene{
  position:absolute; inset:0; display:none;
  flex-direction:column;
}
.scene.active{display:flex;}
.safezone-top, .safezone-bottom{
  position:absolute; left:0; right:0; height:var(--safe);
  z-index:5; pointer-events:none;
}
.safezone-top{top:0;}
.safezone-bottom{bottom:0;}

/* ===== fade transition ===== */
#fade{
  position:absolute; inset:0; background:#000; opacity:0; pointer-events:none; z-index:999;
  transition: opacity .4s ease;
}
#fade.show{opacity:1; pointer-events:all;}

/* ===================== TITLE ===================== */
#scene-title{ align-items:center; justify-content:center; cursor:pointer; }
.title-bg-orb{
  position:absolute; width:900px; height:900px; border-radius:50%;
  background: radial-gradient(circle, rgba(255,154,61,.35), transparent 70%);
  top:-260px; left:50%; transform:translateX(-50%);
  animation: orb-pulse 6s ease-in-out infinite;
}
@keyframes orb-pulse{ 0%,100%{opacity:.6; transform:translateX(-50%) scale(1);} 50%{opacity:1; transform:translateX(-50%) scale(1.06);} }
.title-logo{ text-align:center; z-index:2; margin-top:40px;}
.title-cat-badge{
  width:140px; height:140px; margin:0 auto 18px;
  filter: drop-shadow(0 8px 20px rgba(0,0,0,.4));
}
.title-sub{ letter-spacing:6px; font-size:15px; color:#ffd9a8; font-weight:700; margin-bottom:6px;}
.title-main{ font-size:42px; font-weight:900; color:#fff; text-shadow:0 4px 0 rgba(0,0,0,.3); }
.title-en{ margin-top:14px; font-size:20px; letter-spacing:3px; color:#8fb0ff; font-weight:800;}
.title-touch{
  margin-top:60px; font-size:20px; font-weight:800; color:#ffb02e;
  letter-spacing:2px; opacity:0; visibility:hidden; z-index:2;
}
.title-touch.show{opacity:1; visibility:visible; animation: blink 1.3s ease-in-out infinite;}
@keyframes blink{ 0%,100%{opacity:.25;} 50%{opacity:1;} }
.login-box{
  z-index:2; margin-top:50px; background:rgba(0,0,0,.28); border:1px solid rgba(255,255,255,.15);
  border-radius:16px; padding:22px 26px; width:420px;
}
.login-row{ display:flex; align-items:center; gap:10px; margin-bottom:12px;}
.login-row label{ width:36px; font-size:13px; color:#bcc4dd; font-weight:700;}
.login-row input{
  flex:1; padding:10px 12px; border-radius:8px; border:1px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.08); color:#fff; font-size:14px; outline:none;
}
.login-btns{ display:flex; gap:10px; margin-top:14px;}
.btn-join, .btn-ok{
  flex:1; padding:12px 0; border-radius:10px; border:none; font-weight:800; font-size:15px; cursor:pointer;
}
.btn-join{ background:#3a4160; color:#7c869e; cursor:not-allowed;}
.btn-ok{ background: linear-gradient(180deg,#ffc85a,#ff9d2e); color:#3a2100; }
.btn-ok:active{ transform: translateY(1px); }

/* ===================== LOBBY ===================== */
#scene-lobby{ padding-top: calc(var(--safe) + 18px); padding-bottom: calc(var(--safe) + 10px); align-items:center;}
.topbar{ display:flex; align-items:center; gap:14px; width:690px; margin-bottom:26px;}
.user-chip{
  display:flex; align-items:center; gap:10px; background:var(--panel); border:1px solid rgba(255,255,255,.08);
  border-radius:14px; padding:10px 16px; flex:1;
}
.profile-p{
  width:44px;height:44px;border-radius:50%; background:linear-gradient(145deg,#5c6ad0,#31396b);
  display:flex; align-items:center; justify-content:center; font-weight:900; font-size:16px; flex-shrink:0;
  border:2px solid rgba(255,255,255,.25);
}
.user-info-text{ line-height:1.35;}
.user-name{ font-size:14px; font-weight:800; color:#fff;}
.user-ocp{ font-size:13px; color:#ffd27a; font-weight:700;}
.btn-mall{
  background: linear-gradient(180deg,#ffcf5c,#ff9c1f); color:#402400; font-weight:900; font-size:15px;
  padding:14px 20px; border-radius:14px; border:none; cursor:pointer; white-space:nowrap;
}
.lobby-menu{ width:690px; display:flex; flex-direction:column; gap:20px; flex:1;}
.channel-card{
  position:relative; height:150px; border-radius:18px; overflow:hidden; cursor:pointer;
  display:flex; align-items:center; padding:0 26px; border:2px solid rgba(255,255,255,.08);
  transition: transform .15s ease;
}
.channel-card:active{ transform:scale(.98); }
.channel-card.beginner{ background: linear-gradient(120deg,#ff9a3d 0%, #ffcf6b 100%);}
.channel-card.mid{ background: linear-gradient(120deg,#ff8fb3 0%, #ffc2d6 100%);}
.channel-card.shop{ background: linear-gradient(120deg,#5c6ad0 0%, #8f9bff 100%);}
.channel-icon{ width:110px; height:110px; flex-shrink:0; object-fit:contain; filter:drop-shadow(0 6px 10px rgba(0,0,0,.25));}
.channel-label{ margin-left:20px; font-size:30px; font-weight:900; color:#2c1c04; text-shadow: 0 2px 0 rgba(255,255,255,.3);}
.channel-card.shop .channel-label{ color:#1a1d3d; }
.ranking-box{
  width:690px; margin-top:18px; background:var(--panel); border-radius:14px; padding:14px 18px; border:1px solid rgba(255,255,255,.08);
}
.ranking-title{ font-size:13px; font-weight:800; color:#9fb0ff; margin-bottom:8px; letter-spacing:1px;}
.rank-row{ display:flex; justify-content:space-between; font-size:13px; color:#ccd3ea; padding:4px 0;}
.rank-row b{ color:#ffd27a; }

/* ===================== CHANNEL LOBBY ===================== */
#scene-clobby{ padding-top: calc(var(--safe) + 18px); padding-bottom: calc(var(--safe) + 10px); align-items:center;}
.clobby-topbar{ display:flex; align-items:center; gap:14px; width:690px; margin-bottom:16px;}
.btn-back{
  background:var(--panel2); color:#fff; font-weight:800; padding:14px 20px; border-radius:14px; border:none; cursor:pointer; font-size:15px;
}
.char-group{ width:690px; height:290px; border-radius:20px; background:linear-gradient(160deg,#2c355c,#1a2036);
  display:flex; align-items:flex-end; justify-content:center; gap:6px; padding:16px; margin-bottom:18px; border:1px solid rgba(255,255,255,.08); overflow:hidden;}
.char-figure{ width:130px; }
.btn-gamestart{
  width:690px; padding:22px 0; text-align:center; border-radius:16px; border:none; cursor:pointer;
  background: linear-gradient(180deg,#ffcf5c,#ff9c1f); color:#3a2100; font-weight:900; font-size:26px;
  box-shadow: 0 8px 0 #b6690a; margin-bottom:18px;
}
.btn-gamestart:active{ transform:translateY(6px); box-shadow:0 2px 0 #b6690a;}
.chat-panel{ width:690px; flex:1; background:var(--panel); border-radius:16px; border:1px solid rgba(255,255,255,.08); display:flex; flex-direction:column; overflow:hidden; min-height:220px;}
.chat-log{ flex:1; overflow-y:auto; padding:12px 14px; display:flex; flex-direction:column-reverse; gap:6px;}
.chat-msg{ font-size:13px; color:#dbe1f5; line-height:1.4;}
.chat-msg b{ color:#8fb0ff; margin-right:6px;}
.chat-input-row{ display:flex; gap:8px; padding:10px; border-top:1px solid rgba(255,255,255,.08); background:rgba(0,0,0,.15);}
.chat-input-row input{
  flex:1; padding:11px 12px; border-radius:10px; border:1px solid rgba(255,255,255,.15); background:rgba(255,255,255,.07); color:#fff; font-size:14px; outline:none;
}
.btn-send{ background:var(--accent); color:#402400; font-weight:900; border:none; border-radius:10px; padding:0 18px; cursor:pointer; font-size:14px;}

/* ===================== SHOP (간이) ===================== */
#scene-shop{ align-items:center; justify-content:center; gap:20px; padding-top:var(--safe); padding-bottom:var(--safe);}
.shop-title{ font-size:26px; font-weight:900; color:#ffd27a;}
.shop-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:16px; width:640px;}
.shop-item{ background:var(--panel); border-radius:14px; padding:16px; text-align:center; border:1px solid rgba(255,255,255,.08);}
.shop-item .icon{ width:56px;height:56px;margin:0 auto 8px;}
.shop-item .name{ font-size:13px; font-weight:800; color:#fff;}
.shop-item .price{ font-size:12px; color:#ffd27a; margin-top:4px;}

/* ===================== IN-GAME ===================== */
#scene-ingame{ align-items:center; }
.hud{ width:100%; padding: calc(var(--safe) + 10px) 24px 8px; display:flex; align-items:center; justify-content:space-between; gap:10px;}
.player-hud{ flex:1; display:flex; align-items:center; gap:10px; }
.player-hud.right{ flex-direction:row-reverse; text-align:right;}
.avatar-mini{ width:60px; height:60px; border-radius:50%; border:3px solid rgba(255,255,255,.25); flex-shrink:0; box-shadow:0 4px 10px rgba(0,0,0,.3);}
.hp-wrap{ flex:1; }
.hp-name{ font-size:13px; font-weight:800; margin-bottom:3px;}
.hp-bar-bg{ width:100%; height:14px; background:rgba(0,0,0,.4); border-radius:8px; overflow:hidden; border:1px solid rgba(255,255,255,.15);}
.hp-bar-fill{ height:100%; background:linear-gradient(90deg,#ff5f6d,#ffc371); transition: width .5s ease;}
.player-hud.right .hp-bar-fill{ background:linear-gradient(90deg,#4a7bff,#8fd7ff); float:right;}
.turn-center{ width:150px; text-align:center; }
.turn-label{ font-size:12px; color:#9fb0ff; font-weight:800; letter-spacing:1px;}
.round-label{ font-size:15px; font-weight:900; color:#fff;}

.play-info-bar{ width:690px; display:flex; align-items:center; gap:14px; margin:6px 0 10px;}
.timer-wrap{ flex:1; height:16px; background:rgba(0,0,0,.4); border-radius:10px; overflow:hidden; border:1px solid rgba(255,255,255,.15);}
.timer-fill{ height:100%; width:100%; background:linear-gradient(90deg,#5cf0c0,#4a7bff); transition: width 1s linear;}
.move-wrap{ display:flex; align-items:center; gap:6px; font-weight:900; font-size:14px; color:#ffd27a;}
.move-dot{ width:12px;height:12px;border-radius:50%; background:#3a4160;}
.move-dot.on{ background:#ffb02e; box-shadow:0 0 6px #ffb02e;}

.char-stage{ width:690px; height:118px; display:flex; align-items:flex-end; justify-content:space-between; position:relative; margin-bottom:6px; }
.char-stage-figure{ width:150px; height:110px; display:flex; align-items:flex-end; justify-content:center; }
.char-stage-figure img{ max-width:120px; max-height:110px; object-fit:contain; filter:drop-shadow(0 6px 8px rgba(0,0,0,.35)); transition: transform .25s ease; }
.char-stage-figure.left img{ transform: scaleX(-1); }
.char-stage-figure.bump img{ transform: translateY(-10px) scale(1.08); }
.char-stage-figure.left.bump img{ transform: scaleX(-1) translateY(-10px) scale(1.08); }
.food-bowl-wrap{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; height:100%; padding-bottom:6px; position:relative; }
.food-bowl{ font-size:40px; position:relative; left:0; transition: left .5s cubic-bezier(.34,1.56,.64,1); }
.food-bowl-label{ font-size:11px; color:#9fb0ff; font-weight:800; margin-top:4px; letter-spacing:1px;}
#board-wrap{ position:relative; width:648px; height:648px; margin:6px 0 14px; }
#board{
  position:relative; width:648px; height:648px; background:rgba(0,0,0,.35); border-radius:16px;
  border:2px solid rgba(255,255,255,.1); overflow:hidden;
}
.cell-bg{ position:absolute; width:72px; height:72px; }
.block{
  position:absolute; width:72px; height:72px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; touch-action:none; will-change:transform; z-index:2;
  transition: left .18s ease, top .18s ease;
}
.block-inner{
  width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  box-shadow: 0 4px 8px rgba(0,0,0,.35), inset 0 -4px 6px rgba(0,0,0,.15), inset 0 3px 6px rgba(255,255,255,.25);
  position:relative;
}
.block.matched{ animation: pop-out .32s ease forwards; z-index:5;}
@keyframes pop-out{ 0%{transform:scale(1); opacity:1;} 60%{transform:scale(1.3); opacity:.8;} 100%{transform:scale(0); opacity:0;} }
.block.dropping{ z-index:3; }
.block.spawn{ animation: spawn-in .25s ease; }
@keyframes spawn-in{ 0%{transform:scale(0);} 100%{transform:scale(1);} }
.block.item-glow .block-inner{
  background:none !important; box-shadow:none !important; border-radius:0;
  filter: drop-shadow(0 0 10px rgba(255,224,138,.85));
  animation:item-pulse 1.1s ease-in-out infinite;
}
.block.item-glow .block-inner img, .block.item-glow .block-inner span{ font-size:40px; }
@keyframes item-pulse{ 0%,100%{ transform:scale(1);} 50%{transform:scale(1.12);} }

.fx-layer{ position:absolute; inset:0; pointer-events:none; z-index:20; }
.fx-burst{ position:absolute; width:10px; height:10px; border-radius:50%; background:#fff; opacity:1; }
.fx-line{ position:absolute; background:linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,.95), rgba(255,255,255,0)); height:8px; opacity:0; }
.fx-ring{ position:absolute; border:4px solid rgba(255,255,255,.85); border-radius:50%; opacity:1; }
.fx-flash{ position:absolute; inset:0; background:#fff; opacity:0; }
@keyframes fx-flash-anim{ 0%{opacity:.85;} 100%{opacity:0;} }
.shake{ animation: shake-anim .4s ease; }
@keyframes shake-anim{ 0%,100%{transform:translate(0,0);} 20%{transform:translate(-8px,4px);} 40%{transform:translate(8px,-4px);} 60%{transform:translate(-6px,-4px);} 80%{transform:translate(6px,4px);} }

.floating-score{ position:absolute; font-weight:900; font-size:20px; color:#ffe08a; text-shadow:0 2px 4px rgba(0,0,0,.6); pointer-events:none; z-index:30; animation: float-up .9s ease forwards;}
@keyframes float-up{ 0%{ transform:translateY(0); opacity:1;} 100%{ transform:translateY(-60px); opacity:0;} }

.combo-banner{
  position:absolute; top:40%; left:50%; transform:translate(-50%,-50%) scale(.6); z-index:40;
  font-size:44px; font-weight:900; color:#fff; text-shadow: 0 0 20px #ffb02e, 0 4px 10px rgba(0,0,0,.6);
  opacity:0; pointer-events:none;
}
.combo-banner.show{ animation: combo-pop .8s ease forwards; }
@keyframes combo-pop{ 0%{opacity:0; transform:translate(-50%,-50%) scale(.4);} 25%{opacity:1; transform:translate(-50%,-50%) scale(1.15);} 40%{transform:translate(-50%,-50%) scale(1);} 80%{opacity:1;} 100%{opacity:0; transform:translate(-50%,-50%) scale(1);} }

.turn-banner{
  position:absolute; top:44%; left:50%; transform:translate(-50%,-50%); z-index:50;
  background:rgba(10,12,20,.85); border:2px solid var(--accent); border-radius:20px; padding:20px 40px;
  font-size:26px; font-weight:900; color:#fff; opacity:0; pointer-events:none;
}
.turn-banner.show{ animation: turn-pop 1.1s ease forwards; }
@keyframes turn-pop{ 0%{opacity:0; transform:translate(-50%,-50%) scale(.7);} 20%{opacity:1; transform:translate(-50%,-50%) scale(1);} 80%{opacity:1;} 100%{opacity:0; transform:translate(-50%,-50%) scale(1);} }

/* ===================== RESULT ===================== */
#scene-result{ align-items:center; justify-content:center; text-align:center; }
.result-badge{ font-size:64px; font-weight:900; margin-bottom:10px; }
.result-badge.win{ color:#ffd23a; text-shadow:0 0 30px rgba(255,210,58,.6);}
.result-badge.lose{ color:#8fa0d0; }
.result-sub{ font-size:17px; color:#c9d1ec; margin-bottom:8px;}
.result-score{ font-size:15px; color:#9fb0ff; margin-bottom:36px;}
.result-btns{ display:flex; gap:14px; }
.btn-result{ padding:16px 30px; border-radius:14px; border:none; font-weight:900; font-size:16px; cursor:pointer;}
.btn-result.primary{ background:linear-gradient(180deg,#ffcf5c,#ff9c1f); color:#3a2100;}
.btn-result.secondary{ background:var(--panel2); color:#fff;}

.hidden{ display:none !important; }
</style>
</head>
<body>

<div id="viewport-outer">
  <div id="stage">
    <div id="fade"></div>

    <!-- ============ TITLE ============ -->
    <section id="scene-title" class="scene active">
      <div class="safezone-top"></div>
      <div class="title-bg-orb"></div>
      <div class="title-logo">
        <svg class="title-cat-badge" viewBox="0 0 120 120"><circle cx="60" cy="60" r="56" fill="#ff9a3d"/><path d="M30 30 L40 10 L52 32Z" fill="#ff9a3d"/><path d="M90 30 L80 10 L68 32Z" fill="#ff9a3d"/><circle cx="42" cy="60" r="7" fill="#2c1c04"/><circle cx="78" cy="60" r="7" fill="#2c1c04"/><ellipse cx="60" cy="78" rx="9" ry="6" fill="#fff"/><path d="M52 88 Q60 94 68 88" stroke="#2c1c04" stroke-width="3" fill="none" stroke-linecap="round"/></svg>
        <div class="title-sub">ORANGE CAT &amp; FRIENDS</div>
        <div class="title-main">귤냥이와 친구들</div>
        <div class="title-en">THE 3MATCH PUZZLE</div>
      </div>
      <div class="login-box" id="loginBox">
        <div class="login-row"><label>ID</label><input id="idInput" type="text" placeholder="아이디 입력"></div>
        <div class="login-row"><label>PW</label><input id="pwInput" type="password" placeholder="비밀번호 입력"></div>
        <div class="login-btns">
          <button class="btn-join" id="joinBtn" disabled>JOIN</button>
          <button class="btn-ok" id="okBtn">OK</button>
        </div>
      </div>
      <div class="title-touch" id="touchStart">TOUCH TO START</div>
      <div class="safezone-bottom"></div>
    </section>

    <!-- ============ LOBBY ============ -->
    <section id="scene-lobby" class="scene">
      <div class="safezone-top"></div>
      <div class="topbar">
        <div class="user-chip">
          <div class="profile-p" id="lobbyAvatar">P</div>
          <div class="user-info-text">
            <div class="user-name" id="lobbyName">%이름표시%</div>
            <div class="user-ocp">OCP <span id="lobbyOcp">0</span></div>
          </div>
        </div>
        <button class="btn-mall" id="mallBtn">귤냥이몰</button>
      </div>
      <div class="lobby-menu">
        <div class="channel-card beginner" id="btnBeginner">
          <img class="channel-icon" id="iconBeginner" alt="초급 채널">
          <div class="channel-label">초급 채널</div>
        </div>
        <div class="channel-card mid" id="btnMid">
          <img class="channel-icon" id="iconMid" alt="중급 채널">
          <div class="channel-label">중급 채널</div>
        </div>
        <div class="channel-card shop" id="btnShop">
          <img class="channel-icon" id="iconShop" alt="ITEM SHOP">
          <div class="channel-label">ITEM SHOP</div>
        </div>
      </div>
      <div class="ranking-box">
        <div class="ranking-title">🏆 랭킹 (점수 높은 순)</div>
        <div id="rankList"></div>
      </div>
      <div class="safezone-bottom"></div>
    </section>

    <!-- ============ CHANNEL LOBBY ============ -->
    <section id="scene-clobby" class="scene">
      <div class="safezone-top"></div>
      <div class="clobby-topbar">
        <button class="btn-back" id="clobbyBack">◀ 뒤로가기</button>
        <div class="user-chip" style="flex:1;">
          <div class="profile-p">P</div>
          <div class="user-info-text">
            <div class="user-name" id="clobbyName">%이름표시%</div>
            <div class="user-ocp">OCP <span id="clobbyOcp">0</span></div>
          </div>
        </div>
      </div>
      <div class="char-group" id="charGroup"></div>
      <button class="btn-gamestart" id="gameStartBtn">게임 시작</button>
      <div class="chat-panel">
        <div class="chat-log" id="chatLog"></div>
        <div class="chat-input-row">
          <input id="chatInput" type="text" placeholder="메시지를 입력하세요" maxlength="60">
          <button class="btn-send" id="chatSendBtn">전송</button>
        </div>
      </div>
      <div class="safezone-bottom"></div>
    </section>

    <!-- ============ SHOP ============ -->
    <section id="scene-shop" class="scene">
      <div class="safezone-top"></div>
      <div class="shop-title">ITEM SHOP</div>
      <div class="shop-grid" id="shopGrid"></div>
      <button class="btn-back" id="shopBack">◀ 로비로</button>
      <div class="safezone-bottom"></div>
    </section>

    <!-- ============ IN-GAME ============ -->
    <section id="scene-ingame" class="scene">
      <div class="safezone-top"></div>
      <div class="hud">

const stage = document.getElementById('stage');
function fitStage(){
  const vw = window.innerWidth, vh = window.innerHeight;
  const scale = Math.min(vw/750, vh/1334);
  stage.style.transform = `scale(${scale})`;
}

   1. 씬 전환 관리
   ============================================================ */
const scenes = {};
document.querySelectorAll('.scene').forEach(s=> scenes[s.id]=s);
const fadeEl = document.getElementById('fade');
function goScene(id, opts){
  opts = opts || {};
  fadeEl.classList.add('show');
  setTimeout(()=>{
    Object.values(scenes).forEach(s=>s.classList.remove('active'));
    scenes[id].classList.add('active');
    if(opts.onShow) opts.onShow();
    setTimeout(()=> fadeEl.classList.remove('show'), 30);
  }, 260);
}

/* ============================================================
   3. 캐릭터 SVG 생성기 (bl01~bl05 + 상점 아이템 아이콘)
   ============================================================ */
function catFaceSVG(type, size){
  size = size || 60;
  const palettes = {
    bl01:{base:'#ff9a3d', ear:'#ff9a3d', mark:'#fff', eye:'#2c1c04', hood:true},
    bl02:{base:'#2b2b33', ear:'#2b2b33', mark:'#4b4b58', eye:'#ffd23a', hood:false},
    bl03:{base:'#e0435c', ear:'#e0435c', mark:'#ffb3c2', eye:'#2c1c04', hood:true},
    bl04:{base:'#ffb3cc', ear:'#ffb3cc', mark:'#fff', eye:'#2c1c04', hood:false},
    bl05:{base:'#ff7a1a', ear:'#ff7a1a', mark:'#ffce8a', eye:'#fff', hood:'dino'}
  };
  const p = palettes[type];
  return `<svg width="${size}" height="${size}" viewBox="0 0 60 60">
    <circle cx="30" cy="32" r="22" fill="${p.base}"/>
    <path d="M12 18 L16 4 L26 20Z" fill="${p.ear}"/>
    <path d="M48 18 L44 4 L34 20Z" fill="${p.ear}"/>
    <circle cx="22" cy="33" r="3.4" fill="${p.eye}"/>
    <circle cx="38" cy="33" r="3.4" fill="${p.eye}"/>
    <ellipse cx="30" cy="41" rx="5" ry="3.2" fill="${p.mark}"/>
    ${p.hood===true ? `<path d="M14 16 Q30 2 46 16 Q42 26 30 22 Q18 26 14 16Z" fill="${p.base}" opacity=".85"/>`:''}
    ${p.hood==='dino' ? `<path d="M30 6 L34 16 L26 16Z" fill="#ffce8a"/>`:''}
  </svg>`;
}

const ROWS=9, COLS=9, CELL=72;
const boardEl = document.getElementById('board');

const comboBanner = document.getElementById('comboBanner');
const turnBanner = document.getElementById('turnBanner');

const myHpFill = document.getElementById('myHpFill');
const opHpFill = document.getElementById('opHpFill');

const ITEM_TYPES = {
  it01:{icon:'🍙', name:'세로줄 파괴'}, // 상하 파괴
  it02:{icon:'🍙', name:'가로줄 파괴'}, // 좌우 파괴 (90도 회전 표기로 아이콘 동일, 클래스 구분)
  it03:{icon:'🐟', name:'추적 파괴'},

let grid; // grid[r][c] = {type:'bl01'/'itXX', isItem:bool, el:domNode, r,c}
let cellPositions = []; // px

let game = {
  turn: 'me', // 'me' | 'op'

  timerHandle: null,

function px(i){ return i*CELL; }

function initGame(){
  boardEl.innerHTML='';
  game = { turn:'me', round:1, movesLeft:3, timer:15, timerHandle:null, myHp:1000, opHp:1000, myScore:0, opScore:0, busy:false, lastUserActionTile:null, ended:false };

      const cellData = createBlockEl(r,c,t,false);
      grid[r].push(cellData);
    }
  }
  showTurnBanner('MY TURN');
  startTimer();
}

function randomBlockType(){ return BLOCK_TYPES[Math.floor(Math.random()*BLOCK_TYPES.length)]; }
function causesInitialMatch(r,c,t){
  if(c>=2 && grid[r][c-1] && grid[r][c-1].type===t && grid[r][c-2] && grid[r][c-2].type===t) return true;
  if(r>=2 && grid[r-1] && grid[r-1][c] && grid[r-1][c].type===t && grid[r-2] && grid[r-2][c] && grid[r-2][c].type===t) return true;
  return false;
}

function createBlockEl(r,c,type,isItem,animateSpawn){
  const el = document.createElement('div');
  el.className='block'+(animateSpawn?' spawn':'')+(isItem?' item-glow':'');
  el.style.left = px(c)+'px';
  el.style.top = px(r)+'px';
  const inner = document.createElement('div');
  inner.className='block-inner';
  if(isItem){
    const def = ITEM_TYPES[type];
    inner.innerHTML = `<span>${def.icon}</span>`;
  } else {
    inner.style.background = `radial-gradient(circle at 35% 30%, ${lighten(BLOCK_COLORS[type])}, ${BLOCK_COLORS[type]} 70%)`;
    inner.innerHTML = IMG_ASSETS[type] ? `<img src="${IMG_ASSETS[type]}" style="width:44px;height:44px;object-fit:contain;">` : catFaceSVG(type, 44);
  }
  el.appendChild(inner);
  boardEl.appendChild(el);
  const cellData = {type, isItem: !!isItem, el, r, c};
  el._cellRef = cellData; // 항상 이 블록의 "현재" 좌표를 담고 있는 참조 (스왑/낙하 시에도 최신 유지)
  attachPointerHandlers(el);
  return cellData;
}
function lighten(hex){
  const n = parseInt(hex.slice(1),16);
  let r=(n>>16)+50, g=((n>>8)&0xff)+50, b=(n&0xff)+50;
  r=Math.min(255,r); g=Math.min(255,g); b=Math.min(255,b);
  return `rgb(${r},${g},${b})`;
}

/* ---------- 입력 처리 (마우스/터치 공용 Pointer Events) ---------- */
let dragState = null;
function attachPointerHandlers(el){
  el.addEventListener('pointerdown', (e)=>{
    if(game.busy || game.turn!=='me' || game.ended) return;
    e.preventDefault();
    const cur = el._cellRef; // 이 블록의 현재 실제 좌표 (스왑/낙하 이후에도 항상 최신)
    dragState = { startX:e.clientX, startY:e.clientY, r: cur.r, c: cur.c, moved:false, tapTime:Date.now(), el };
    el.setPointerCapture(e.pointerId);
  });
  el.addEventListener('pointermove', (e)=>{
    if(!dragState || dragState.el!==el) return;
    const dx = e.clientX - dragState.startX, dy = e.clientY - dragState.startY;
    const scale = stage.getBoundingClientRect().width/750;
    const thresh = 18*scale;
    if(Math.abs(dx)<thresh && Math.abs(dy)<thresh) return;
    dragState.moved = true;
    let dir;
    if(Math.abs(dx)>Math.abs(dy)) dir = dx>0?'right':'left';
    else dir = dy>0?'down':'up';
    finishDrag(dragState.r, dragState.c, dir);
    dragState = null;
  });
  el.addEventListener('pointerup', (e)=>{
    if(!dragState || dragState.el!==el) return;
    const wasTap = !dragState.moved && (Date.now()-dragState.tapTime < 400);
    const rr = dragState.r, cc = dragState.c;
    dragState = null;
    if(wasTap){
      handleTapCell(rr,cc);
    }
  });
  el.addEventListener('pointercancel', ()=>{ dragState=null; });
}

function finishDrag(r,c,dir){
  let nr=r, nc=c;
  if(dir==='up') nr--; else if(dir==='down') nr++; else if(dir==='left') nc--; else nc++;
  if(nr<0||nr>=ROWS||nc<0||nc>=COLS) return;
  attemptSwap(r,c,nr,nc);
}

function handleTapCell(r,c){
  const cell = grid[r][c];
  if(!cell || !cell.isItem) return;
  if(game.busy) return;
  game.busy = true;
  game.lastUserActionTile = {r,c};
  activateItem(r,c, cell.type, 'tap').then(()=>{
    consumeMoveAndContinue();
  });
}

/* ---------- 스왑 처리 ---------- */
function attemptSwap(r1,c1,r2,c2){
  if(game.busy) return;
  const a = grid[r1][c1], b = grid[r2][c2];
  if(!a||!b) return;
  game.busy = true;
  game.lastUserActionTile = {r:r2,c:c2};

  // 아이템끼리 스왑 -> 조합 발동
  if(a.isItem && b.isItem){
    swapCells(r1,c1,r2,c2, true).then(()=>{
      activateCombo(r2,c2, a.type, b.type).then(()=> consumeMoveAndContinue());
    });
    return;
  }
  // 아이템 + 일반블록 드래그 -> 드래그 위치(대상 칸)에서 아이템 발동
  if(a.isItem && !b.isItem){
    swapCells(r1,c1,r2,c2, true).then(()=>{
      activateItem(r2,c2, a.type, 'drag').then(()=> consumeMoveAndContinue());
    });
    return;
  }
  if(b.isItem && !a.isItem){
    swapCells(r1,c1,r2,c2, true).then(()=>{
      activateItem(r1,c1, b.type, 'drag').then(()=> consumeMoveAndContinue());
    });
    return;
  }

  swapCells(r1,c1,r2,c2,false).then(()=>{
    const sets = findMatchSets();
    if(sets.length===0){
      // 매치 실패 -> 원위치
      swapCells(r1,c1,r2,c2,false).then(()=>{ game.busy=false; });
    } else {
      processMatches(sets, {r:r2,c:c2}).then(()=>{
        consumeMoveAndContinue();
      });
    }
  });
}

function swapCells(r1,c1,r2,c2, instant){
  return new Promise(resolve=>{
    const a = grid[r1][c1], b = grid[r2][c2];
    grid[r1][c1]=b; grid[r2][c2]=a;
    b.r=r1; b.c=c1; a.r=r2; a.c=c2;
    b.el.style.left = px(c1)+'px'; b.el.style.top = px(r1)+'px';
    a.el.style.left = px(c2)+'px'; a.el.style.top = px(r2)+'px';
    setTimeout(resolve, instant?0:190);
  });
}

/* ---------- 매치 판정 (마킹 시스템) ---------- */
function findMatchSets(){
  // 1단계: 가로/세로 3+ 연속 라인 수집
  const lines = []; // {coords:[[r,c],...], dir:'h'|'v'}
  for(let r=0;r<ROWS;r++){
    let run=[0];
    for(let c=1;c<=COLS;c++){
      const same = c<COLS && grid[r][c] && !grid[r][c].isItem && grid[r][c-1] && !grid[r][c-1].isItem && grid[r][c].type===grid[r][c-1].type;
      if(same){ run.push(c); }
      else{
        if(run.length>=3) lines.push({coords: run.map(cc=>[r,cc]), dir:'h'});
        run=[c];
      }
    }
  }
  for(let c=0;c<COLS;c++){
    let run=[0];
    for(let r=1;r<=ROWS;r++){
      const same = r<ROWS && grid[r][c] && !grid[r][c].isItem && grid[r-1][c] && !grid[r-1][c].isItem && grid[r][c].type===grid[r-1][c].type;
      if(same){ run.push(r); }
      else{
        if(run.length>=3) lines.push({coords: run.map(rr=>[rr,c]), dir:'v'});
        run=[r];
      }
    }
  }
  // 2단계: 좌표 공유 라인끼리 Union-Find로 병합 (라인이 없어도 2x2 사각 판정은 아래에서 계속 진행)
  const key = (r,c)=> r+'_'+c;
  const parent = {};
  function find(x){ if(parent[x]!==x) parent[x]=find(parent[x]); return parent[x]; }
  function union(x,y){ const a=find(x),b=find(y); if(a!==b) parent[a]=b; }
  lines.forEach(line=>{
    line.coords.forEach(([r,c])=>{ const k=key(r,c); if(!(k in parent)) parent[k]=k; });
    for(let i=1;i<line.coords.length;i++){
      union(key(line.coords[0][0],line.coords[0][1]), key(line.coords[i][0],line.coords[i][1]));
    }
  });
  // 서로 다른 라인이 겹치면 union
  for(let i=0;i<lines.length;i++){
    for(const [r,c] of lines[i].coords){
      const k = key(r,c);
      for(let j=i+1;j<lines.length;j++){
        for(const [r2,c2] of lines[j].coords){
          if(r===r2 && c===c2) union(k, key(r2,c2));
        }
      }
    }
  }
  const groups = {};
  Object.keys(parent).forEach(k=>{
    const root = find(k);
    if(!groups[root]) groups[root]=new Set();
    groups[root].add(k);
  });
  // 각 group에 소속된 라인들의 dir/길이 정보 취합
  const setsOut = [];
  Object.values(groups).forEach(coordSet=>{
    const coords = Array.from(coordSet).map(k=>{ const [r,c]=k.split('_').map(Number); return [r,c]; });
    // maxRowLen / maxColLen 계산
    const byRow = {}, byCol = {};
    coords.forEach(([r,c])=>{ byRow[r]=(byRow[r]||0)+1; byCol[c]=(byCol[c]||0)+1; });
    const maxRowLen = Math.max(...Object.values(byRow));
    const maxColLen = Math.max(...Object.values(byCol));
    // 2x2 사각형 판정 (동일 타입 4개 밀집) - 별도 검사
    setsOut.push({ coords, maxRowLen, maxColLen, type: grid[coords[0][0]][coords[0][1]].type });
  });

  // 2x2 사각형 탐지 (라인 매치 없이 사각형만 있는 경우 대비, 별도 스캔)
  for(let r=0;r<ROWS-1;r++){
    for(let c=0;c<COLS-1;c++){
      const a=grid[r][c], b=grid[r][c+1], d=grid[r+1][c], e=grid[r+1][c+1];
      if(a&&b&&d&&e && !a.isItem&&!b.isItem&&!d.isItem&&!e.isItem &&
         a.type===b.type && a.type===d.type && a.type===e.type){
        const coords=[[r,c],[r,c+1],[r+1,c],[r+1,c+1]];
        // 이미 포함된 그룹이 있는지 체크, 없으면 새 세트로 추가하되 square 플래그
        let merged=false;
        setsOut.forEach(s=>{
          if(s.coords.some(([rr,cc])=> coords.some(([r2,c2])=> rr===r2&&cc===c2))){
            coords.forEach(cd=>{ if(!s.coords.some(([r2,c2])=> r2===cd[0]&&c2===cd[1])) s.coords.push(cd); });
            s.isSquare = true;
            merged = true;
          }
        });
        if(!merged) setsOut.push({coords, maxRowLen:2, maxColLen:2, type:a.type, isSquare:true});
      }
    }
  }
  return setsOut;
}

/* ---------- 우선순위 필터 ---------- */
function decideItemForSet(set){
  if(Math.max(set.maxRowLen,set.maxColLen)>=5) return 'it05';
  if(set.maxRowLen>=3 && set.maxColLen>=3) return 'it04';
  if(set.maxRowLen===4 && set.maxColLen<3) return 'it01'; // 가로4 -> 세로줄파괴
  if(set.maxColLen===4 && set.maxRowLen<3) return 'it02'; // 세로4 -> 가로줄파괴
  if(set.isSquare) return 'it03';
  return null;
}
function spawnCoordFor(set, userTile){
  if(userTile && set.coords.some(([r,c])=> r===userTile.r && c===userTile.c)) return userTile;
  // 교차 타일 탐색
  const byRow={}, byCol={};
  set.coords.forEach(([r,c])=>{ (byRow[r]=byRow[r]||[]).push(c); (byCol[c]=byCol[c]||[]).push(r); });
  for(const [r,c] of set.coords){
    if((byRow[r]||[]).length>=3 && (byCol[c]||[]).length>=3) return {r,c};
  }
  // 중심점
  const rs = set.coords.map(x=>x[0]), cs = set.coords.map(x=>x[1]);
  const cr = Math.round(rs.reduce((a,b)=>a+b,0)/rs.length);
  const cc = Math.round(cs.reduce((a,b)=>a+b,0)/cs.length);
  // 가장 가까운 실제 좌표
  let best=set.coords[0], bd=1e9;
  set.coords.forEach(([r,c])=>{ const d=Math.abs(r-cr)+Math.abs(c-cc); if(d<bd){bd=d; best=[r,c];} });
  return {r:best[0], c:best[1]};
}

/* ---------- 매치 처리 파이프라인 ---------- */
function processMatches(sets, userTile){
  return new Promise(async (resolve)=>{
    let totalCleared=0, comboCount=0, premium=false;
    let firstPass = true;
    let pendingUserTile = userTile;
    while(true){
      const curSets = firstPass ? sets : findMatchSets();
      firstPass = false;
      if(!curSets || curSets.length===0) break;
      comboCount++;
      let clearedThisPass=[];
      const spawns = [];
      curSets.forEach(set=>{
        const itemType = decideItemForSet(set);
        const spot = spawnCoordFor(set, pendingUserTile);
        set.coords.forEach(([r,c])=>{
          if(itemType && r===spot.r && c===spot.c) return; // 아이템 생성 위치는 소멸 제외
          clearedThisPass.push([r,c]);
        });
        if(itemType) spawns.push({r:spot.r, c:spot.c, type:itemType});
        if(Math.max(set.maxRowLen,set.maxColLen)>=5 && set.maxRowLen>=5 && set.maxColLen>=5) premium=true;
      });
      pendingUserTile = null;
      await animateClear(clearedThisPass);
      totalCleared += clearedThisPass.length;
      // 아이템 스폰 (좌표 위치를 아이템으로 교체)
      spawns.forEach(s=>{
        removeBlockAt(s.r,s.c,true);
        const nb = createBlockEl(s.r,s.c,s.type,true,true);
        grid[s.r][s.c]=nb;
        spawnFxFlash(s.r,s.c);
      });
      clearedThisPass.forEach(([r,c])=>{ if(!spawns.some(s=>s.r===r&&s.c===c)) removeBlockAt(r,c,false); });
      await dropAndRefill();
      if(comboCount>=2) showComboBanner(comboCount);
    }
    if(premium) triggerPremiumFx();
    if(totalCleared>0){
      const scoreGain = totalCleared*10 + (comboCount>1? comboCount*30:0);
      applyScore(scoreGain);
    }
    resolve();
  });
}

function removeBlockAt(r,c, skip){
  const cell = grid[r][c];
  if(cell && cell.el && cell.el.parentNode){
    if(!skip) cell.el.classList.add('matched');
    setTimeout(()=>{ if(cell.el.parentNode) cell.el.parentNode.removeChild(cell.el); }, skip?0:320);
  }
  grid[r][c]=null;
}

function animateClear(coords){
  return new Promise(resolve=>{
    coords.forEach(([r,c])=>{
      spawnFxBurst(r,c);
      const cell = grid[r][c];
      if(cell) cell.el.classList.add('matched');
    });
    if(coords.length>0) floatScoreText(coords[Math.floor(coords.length/2)], coords.length*10);
    setTimeout(resolve, coords.length? 330: 0);
  });
}

function dropAndRefill(){
  return new Promise(resolve=>{
    for(let c=0;c<COLS;c++){
      let writeR = ROWS-1;
      for(let r=ROWS-1;r>=0;r--){
        if(grid[r][c]){
          if(r!==writeR){
            const cell = grid[r][c];
            grid[writeR][c]=cell; grid[r][c]=null;
            cell.r=writeR;
            cell.el.style.top = px(writeR)+'px';
          }
          writeR--;
        }
      }
      for(let r=writeR; r>=0; r--){
        const t = randomBlockType();
        const nb = createBlockEl(r,c,t,false,false);
        nb.el.style.top = px(r - (writeR+1))+'px'; // 위에서 시작
        nb.el.style.left = px(c)+'px';
        grid[r][c]=nb;
        requestAnimationFrame(()=>{ nb.el.style.top = px(r)+'px'; });
      }
    }
    setTimeout(resolve, 260);
  });
}

/* ---------- 아이템 발동 ---------- */
function activateItem(r,c,type,mode){
  return new Promise(async resolve=>{
    removeBlockAt(r,c,true);
    let targets = [];
    if(type==='it01'){ // 세로줄(상하) 파괴
      for(let rr=0; rr<ROWS; rr++) if(rr!==r) targets.push([rr,c]);
      spawnFxLineV(c);
    } else if(type==='it02'){ // 가로줄(좌우) 파괴
      for(let cc=0; cc<COLS; cc++) if(cc!==c) targets.push([r,cc]);
      spawnFxLineH(r);
    } else if(type==='it03'){ // 추적 파괴 - 랜덤 1개
      const cand=[];
      for(let rr=0;rr<ROWS;rr++)for(let cc=0;cc<COLS;cc++) if(!(rr===r&&cc===c) && grid[rr][cc]) cand.push([rr,cc]);
      if(cand.length){ const t = cand[Math.floor(Math.random()*cand.length)]; targets.push(t); spawnFxTracker(r,c,t[0],t[1]); }
    } else if(type==='it04'){ // 범위 파괴 (주변 1칸)
      for(let dr=-1;dr<=1;dr++) for(let dc=-1;dc<=1;dc++){
        const rr=r+dr, cc=c+dc;
        if(rr>=0&&rr<ROWS&&cc>=0&&cc<COLS&&!(dr===0&&dc===0)) targets.push([rr,cc]);
      }
      spawnFxRing(r,c,1);
      stageShake();
    } else if(type==='it05'){ // 일괄 파괴
      let targetType;
      if(mode==='drag' && game.lastUserActionTile){
        // 드래그된 인접 블록과 같은 종류 (근접 셀 기준)
        const near = neighborsOf(r,c).map(([rr,cc])=>grid[rr][cc]).find(x=>x && !x.isItem);
        targetType = near ? near.type : mostCommonType();
      } else {
        targetType = mostCommonType();
      }
      for(let rr=0;rr<ROWS;rr++) for(let cc=0;cc<COLS;cc++){
        if(grid[rr][cc] && !grid[rr][cc].isItem && grid[rr][cc].type===targetType) targets.push([rr,cc]);
      }
      spawnFxFlash(r,c, true);
    }
    // 스플래시: 파괴 대상 중 아이템이 있으면 연쇄 발동
    const chainItems = [];
    targets.forEach(([rr,cc])=>{
      const cell = grid[rr][cc];
      if(cell && cell.isItem) chainItems.push({r:rr,c:cc,type:cell.type});
    });
    await animateClear(targets.filter(([rr,cc])=> !chainItems.some(ci=>ci.r===rr&&ci.c===cc)));
    targets.forEach(([rr,cc])=>{ if(!chainItems.some(ci=>ci.r===rr&&ci.c===cc)) removeBlockAt(rr,cc,false); });
    applyScore(targets.length*12 + 40);
    for(const ci of chainItems){
      await activateItem(ci.r, ci.c, ci.type, 'chain');
    }
    await dropAndRefill();
    // 폭포 후 자동매치 처리
    const sets = findMatchSets();
    if(sets.length>0) await processMatches(sets, null);
    resolve();
  });
}
function neighborsOf(r,c){
  const arr=[];
  [[r-1,c],[r+1,c],[r,c-1],[r,c+1]].forEach(([rr,cc])=>{ if(rr>=0&&rr<ROWS&&cc>=0&&cc<COLS) arr.push([rr,cc]); });
  return arr;
}
function mostCommonType(){
  const cnt={};
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){ const cell=grid[r][c]; if(cell&&!cell.isItem) cnt[cell.type]=(cnt[cell.type]||0)+1; }
  let best=BLOCK_TYPES[0], bv=-1;
  Object.keys(cnt).forEach(k=>{ if(cnt[k]>bv){ bv=cnt[k]; best=k; } });
  return best;
}

/* ---------- 아이템 조합 ---------- */
function activateCombo(r,c,typeA,typeB){
  return new Promise(async resolve=>{
    const key = [typeA,typeB].sort().join('+');
    showComboBanner('ITEM COMBO!');
    stageShake();
    let targets=[];
    if(key==='it01+it01'){
      for(let rr=0; rr<ROWS; rr++) for(let cc=c-1;cc<=c+1;cc++) if(cc>=0&&cc<COLS) targets.push([rr,cc]);
    } else if(key==='it01+it02'){
      for(let rr=0;rr<ROWS;rr++) targets.push([rr,c]);
      for(let cc=0;cc<COLS;cc++) targets.push([r,cc]);
    } else if(key==='it02+it02'){
      for(let cc=0;cc<COLS;cc++) for(let rr=r-1;rr<=r+1;rr++) if(rr>=0&&rr<ROWS) targets.push([rr,cc]);
    } else if(key==='it01+it03'){
      const t = randomCoordExcept(r,c); if(t){ removeBlockAt(r,c,true); await activateItem(t[0],t[1],'it01','chain'); resolve(); return; }
    } else if(key==='it02+it03'){
      const t = randomCoordExcept(r,c); if(t){ removeBlockAt(r,c,true); await activateItem(t[0],t[1],'it02','chain'); resolve(); return; }
    } else if(key==='it03+it04'){
      const t = randomCoordExcept(r,c); if(t){ removeBlockAt(r,c,true); await activateItem(t[0],t[1],'it04','chain'); resolve(); return; }
    } else if(key==='it03+it03'){
      const t1=randomCoordExcept(r,c); const t2=randomCoordExcept(r,c);
      removeBlockAt(r,c,true);
      if(t1) await activateItem(t1[0],t1[1],'it03','chain');
      if(t2) await activateItem(t2[0],t2[1],'it03','chain');
      resolve(); return;
    } else if(key==='it04+it04'){
      for(let dr=-2;dr<=2;dr++) for(let dc=-2;dc<=2;dc++){ const rr=r+dr,cc=c+dc; if(rr>=0&&rr<ROWS&&cc>=0&&cc<COLS) targets.push([rr,cc]); }
      stageShake();
    } else if(key==='it05+it05'){
      for(let rr=0;rr<ROWS;rr++) for(let cc=0;cc<COLS;cc++) if(!grid[rr][cc].isItem) targets.push([rr,cc]);
      spawnFxFlash(r,c,true); stageShake();
    } else if(key==='it01+it05' || key==='it02+it05'){
      for(let rr=0;rr<ROWS;rr++) for(let cc=0;cc<COLS;cc++) if(grid[rr][cc] && !grid[rr][cc].isItem) targets.push([rr,cc]);
    } else if(key==='it03+it05'){
      for(let rr=0;rr<ROWS;rr++) for(let cc=0;cc<COLS;cc++) if(grid[rr][cc] && !grid[rr][cc].isItem) targets.push([rr,cc]);
    } else if(key==='it04+it05'){
      for(let rr=0;rr<ROWS;rr++) for(let cc=0;cc<COLS;cc++) if(grid[rr][cc] && !grid[rr][cc].isItem) targets.push([rr,cc]);
      stageShake();
    } else {
      // 기본값: 두 아이템을 각각 순차 발동
      removeBlockAt(r,c,true);
      await activateItem(r,c,typeA,'chain');
      resolve(); return;
    }
    removeBlockAt(r,c,true);
    targets = targets.filter((v,i,a)=> a.findIndex(x=>x[0]===v[0]&&x[1]===v[1])>=0);
    await animateClear(targets);
    targets.forEach(([rr,cc])=>{ if(grid[rr][cc]) removeBlockAt(rr,cc,false); });
    applyScore(targets.length*14 + 80);
    await dropAndRefill();
    const sets = findMatchSets();
    if(sets.length>0) await processMatches(sets, null);
    resolve();
  });
}
function randomCoordExcept(er,ec){
  const cand=[];
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++) if(!(r===er&&c===ec) && grid[r][c]) cand.push([r,c]);
  if(!cand.length) return null;
  return cand[Math.floor(Math.random()*cand.length)];
}

/* ---------- 점수/체력 반영 ---------- */
function applyScore(amount){
  if(amount<=0) return;
  if(game.turn==='me'){
    game.myScore += amount;
    game.opHp = Math.max(0, game.opHp - amount);
    opHpFill.style.width = (game.opHp/1000*100)+'%';
  } else {
    game.opScore += amount;
    game.myHp = Math.max(0, game.myHp - amount);
    myHpFill.style.width = (game.myHp/1000*100)+'%';
  }
}
function floatScoreText(coord, amount){
  if(!coord) return;
  const [r,c]=coord;
  const el = document.createElement('div');
  el.className='floating-score';
  el.textContent = '+'+ (amount*1) ;
  el.style.left = (px(c)+10)+'px';
  el.style.top = (px(r)+10)+'px';
  fxLayer.appendChild(el);
  setTimeout(()=> el.remove(), 950);
}

/* ---------- FX 연출 ---------- */
function spawnFxBurst(r,c){
  const cx = px(c)+36, cy = px(r)+36;
  for(let i=0;i<7;i++){
    const p = document.createElement('div');
    p.className='fx-burst';
    p.style.left=cx+'px'; p.style.top=cy+'px';
    p.style.background = '#ffe08a';
    fxLayer.appendChild(p);
    const ang = Math.random()*Math.PI*2, dist = 20+Math.random()*30;
    p.animate([
      {transform:'translate(0,0) scale(1)', opacity:1},
      {transform:`translate(${Math.cos(ang)*dist}px, ${Math.sin(ang)*dist}px) scale(0)`, opacity:0}
    ], {duration:400, easing:'ease-out'});
    setTimeout(()=>p.remove(), 420);
  }
}
function spawnFxLineV(c){
  const l = document.createElement('div');
  l.className='fx-line';
  l.style.width='8px'; l.style.height='648px';
  l.style.left=(px(c)+32)+'px'; l.style.top='0px';
  l.style.background='linear-gradient(180deg, rgba(255,255,255,0), rgba(255,220,140,.95), rgba(255,255,255,0))';
  l.style.opacity='1';
  fxLayer.appendChild(l);
  setTimeout(()=>l.remove(), 400);
}
function spawnFxLineH(r){
  const l = document.createElement('div');
  l.className='fx-line';
  l.style.width='648px'; l.style.height='8px';
  l.style.top=(px(r)+32)+'px'; l.style.left='0px';
  l.style.opacity='1';
  fxLayer.appendChild(l);
  setTimeout(()=>l.remove(), 400);
}
function spawnFxRing(r,c){
  const ring = document.createElement('div');
  ring.className='fx-ring';
  ring.style.width='40px'; ring.style.height='40px';
  ring.style.left=(px(c)+16)+'px'; ring.style.top=(px(r)+16)+'px';
  fxLayer.appendChild(ring);
  ring.animate([{transform:'scale(.5)', opacity:1},{transform:'scale(3.2)', opacity:0}], {duration:450, easing:'ease-out'});
  setTimeout(()=>ring.remove(), 460);
}
function spawnFxTracker(r1,c1,r2,c2){
  const dot = document.createElement('div');
  dot.style.position='absolute'; dot.style.width='16px'; dot.style.height='16px'; dot.style.borderRadius='50%';
  dot.style.background='#ffe08a'; dot.style.left=(px(c1)+28)+'px'; dot.style.top=(px(r1)+28)+'px'; dot.style.zIndex=25;
  fxLayer.appendChild(dot);
  dot.animate([{left:(px(c1)+28)+'px', top:(px(r1)+28)+'px'},{left:(px(c2)+28)+'px', top:(px(r2)+28)+'px'}], {duration:300, easing:'ease-in-out'});
  setTimeout(()=>dot.remove(), 320);
}
function spawnFxFlash(r,c, big){
  const f = document.createElement('div');
  f.className='fx-flash';
  if(big){ f.style.animation='fx-flash-anim .5s ease'; }
  else{ f.style.left=(px(c))+'px'; f.style.top=(px(r))+'px'; f.style.width='72px'; f.style.height='72px'; f.style.borderRadius='50%'; f.style.animation='fx-flash-anim .35s ease'; }
  fxLayer.appendChild(f);
  setTimeout(()=>f.remove(), 520);
}
function triggerPremiumFx(){
  stageShake();
  spawnFxFlash(4,4,true);
  showComboBanner('PREMIUM MATCH!');
  applyScore(150);
}
function stageShake(){
  boardEl.classList.add('shake');
  setTimeout(()=> boardEl.classList.remove('shake'), 420);
}
function showComboBanner(n){
  comboBanner.textContent = typeof n==='number' ? `${n} COMBO!` : n;
  comboBanner.classList.remove('show'); void comboBanner.offsetWidth;
  comboBanner.classList.add('show');
}
function showTurnBanner(text){
  turnBanner.textContent = text;
  turnBanner.classList.remove('show'); void turnBanner.offsetWidth;
  turnBanner.classList.add('show');
}

/* ---------- 턴 / 타이머 / MOVE 관리 ---------- */
function updateMoveDots(){
  dots.forEach((d,i)=> d.classList.toggle('on', i < game.movesLeft));
}
function startTimer(){
  clearInterval(game.timerHandle);
  game.timer = 15;
  timerFill.style.width='100%';
  game.timerHandle = setInterval(()=>{
    if(game.busy || game.ended) return;
    game.timer -= 1;
    timerFill.style.width = Math.max(0,(game.timer/15*100))+'%';
    if(game.timer<=0){
      clearInterval(game.timerHandle);
      endTurn();
    }
  }, 1000);
}
function consumeMoveAndContinue(){
  game.movesLeft -= 1;
  updateMoveDots();
  game.busy = false;
  checkWinLose();
  if(game.ended) return;
  if(game.movesLeft<=0){
    endTurn();
  } else {
    game.timer = 15; // 매치 완료 시 제한시간 리셋 후 재생
    timerFill.style.width='100%';
  }
}
function stealFood(side){
  // side: 'me' | 'op' - 방금 턴을 마친 쪽이 가운데 밥을 자기 쪽으로 뺏어감
  const bowl = document.getElementById('foodBowl');
  const myFig = document.getElementById('myCharFigure');
  const opFig = document.getElementById('opCharFigure');
  bowl.style.left = (side==='me') ? '-70px' : '70px';
  const fig = side==='me' ? myFig : opFig;
  fig.classList.add('bump');
  setTimeout(()=>{ fig.classList.remove('bump'); }, 320);
  setTimeout(()=>{ bowl.style.left='0px'; }, 650);
}
function endTurn(){
  if(game.ended) return;
  clearInterval(game.timerHandle);
  game.busy = true;
  stealFood(game.turn);
  if(game.turn==='me'){
    game.turn='op';
    game.movesLeft=3; updateMoveDots();
    turnLabel.textContent='OPPONENT TURN';
    showTurnBanner('OPPONENT TURN');
    setTimeout(runOpponentTurn, 900);
  } else {
    game.turn='me';
    game.round += 1;
    roundNumEl.textContent = game.round;
    game.movesLeft=3; updateMoveDots();
    turnLabel.textContent='MY TURN';
    showTurnBanner('MY TURN');
    game.busy=false;
    startTimer();
  }
}

/* ---------- 간단 AI (상대 턴 자동 플레이) ---------- */
function findAnyValidSwap(){
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      if(!grid[r][c] || grid[r][c].isItem) continue;
      const options = [[r,c+1],[r+1,c]];
      for(const [nr,nc] of options){
        if(nr>=ROWS||nc>=COLS) continue;
        if(!grid[nr][nc] || grid[nr][nc].isItem) continue;
        // 임시 스왑 검사
        const tmp = grid[r][c].type;
        grid[r][c].type = grid[nr][nc].type; grid[nr][nc].type = tmp;
        const has = findMatchSets().length>0;
        const tmp2 = grid[r][c].type; grid[r][c].type = grid[nr][nc].type; grid[nr][nc].type = tmp2;
        if(has) return {r,c,nr,nc};
      }
    }
  }
  return null;
}
function runOpponentTurn(){
  if(game.ended) return;
  if(game.movesLeft<=0){ game.busy=false; endTurn(); return; }
  // 아이템 우선 사용
  let itemCell=null;
  outer:
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){ if(grid[r][c] && grid[r][c].isItem){ itemCell={r,c}; break outer; } }
  if(itemCell && Math.random()<0.5){
    game.lastUserActionTile = itemCell;
    activateItem(itemCell.r,itemCell.c, grid[itemCell.r][itemCell.c].type, 'tap').then(()=>{
      game.movesLeft-=1; updateMoveDots(); checkWinLose();
      if(!game.ended) setTimeout(runOpponentTurn, 700);
    });
    return;
  }
  const mv = findAnyValidSwap();
  if(!mv){ endTurn(); return; }
  game.lastUserActionTile = {r:mv.nr,c:mv.nc};
  swapCells(mv.r,mv.c,mv.nr,mv.nc,false).then(()=>{
    const sets = findMatchSets();
    processMatches(sets, {r:mv.nr,c:mv.nc}).then(()=>{
      game.movesLeft -= 1; updateMoveDots();
      checkWinLose();
      if(game.ended) return;
      if(game.movesLeft<=0){ endTurn(); }
      else setTimeout(runOpponentTurn, 700);
    });
  });
}

/* ---------- 승패 판정 ---------- */
function checkWinLose(){
  if(game.ended) return;
  if(game.opHp<=0){ finishGame(true); }
  else if(game.myHp<=0){ finishGame(false); }
}
function finishGame(win){
  game.ended = true;
  clearInterval(game.timerHandle);
  setTimeout(()=>{
    const badge = document.getElementById('resultBadge');
    const sub = document.getElementById('resultSub');
    badge.textContent = win? 'WIN!' : 'LOSE...';
    badge.className = 'result-badge '+(win?'win':'lose');
    sub.textContent = win? '축하합니다! 승리했습니다.' : '아쉽지만 패배했습니다. 다시 도전해보세요!';
    document.getElementById('resultScore').textContent = `최종 점수 ${game.myScore} : ${game.opScore}`;
    goScene('scene-result');
  }, 700);
}
document.getElementById('resultToLobby').addEventListener('click', ()=> goScene('scene-lobby'));
document.getElementById('resultRetry').addEventListener('click', ()=> goScene('scene-ingame', {onShow: initGame}));

})();
